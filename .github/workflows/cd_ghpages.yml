name: Deploy on GitHub Pages
on:
  push:
    branches:
      - master
      - main
      - dev
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
  schedule:
    - cron: "17 8 * * *"

env:
  ONTOLOGY_NAME: magnetic-materials
  ONTOLOGY_PREFIX: magmo
  ONTOLOGY_IRI: https://w3id.org/emmo/domain/magnetic-materials

permissions:
  contents: write


jobs:
  deploy-on-ghpages:
    #concurrency: ci-${{ github.ref }}  # Recommended if you intend to make multiple deployments in quick succession.
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.13 # Tripper does not support 3.14 yet.

    - name: Install EMMOntoPy and tripper
      run: |
        pip install --upgrade pip
        pip install \
            "EMMOntoPy[ontokit] @ git+https://github.com/emmo-repo/EMMOntoPy.git@master" \
            "tripper[datadoc] @ git+https://github.com/EMMC-ASBL/tripper.git@master"

    #- name: Install current ontology for keywords tool
    #  run: |
    #    pip install -U git+

    - name: Install ROBOT
      run: |
        mkdir bin
        wget -nv https://github.com/ontodev/robot/releases/download/v1.9.6/robot.jar
        mv robot.jar bin/.
        curl https://raw.githubusercontent.com/ontodev/robot/master/bin/robot > bin/robot
        chmod +x bin/robot
        ls -l bin/

    - name: Download Widoco
      run: |
        wget --quiet https://github.com/dgarijo/Widoco/releases/download/v1.4.25/widoco-1.4.25-jar-with-dependencies_JDK-17.jar

    - name: Copy readme and license files to gh-pages
      run: |
        mkdir build
        cp README.md LICENSE build/.

    - name: Create dependencies on gh-pages
      run: |
        ontoconvert \
            -saw \
            --namespace="emmo:https://w3id.org/emmo#" \
            --namespace="${ONTOLOGY_PREFIX}:https://w3id.org/emmo/domain/${ONTOLOGY_NAME}#" \
            ${ONTOLOGY_NAME}-dependencies.ttl \
            build/${ONTOLOGY_NAME}-dependencies.ttl

    - name: Create squashed ontology
      run: |
        ontoconvert \
            -sawe \
            --namespace="emmo:https://w3id.org/emmo#" \
            --namespace="${ONTOLOGY_PREFIX}:https://w3id.org/emmo/domain/${ONTOLOGY_NAME}#" \
            --base-iri="https://w3id.org/emmo/domain/${ONTOLOGY_NAME}#" \
            --iri="https://w3id.org/emmo/domain/${ONTOLOGY_NAME}" \
            ${ONTOLOGY_NAME}.ttl \
            build/${ONTOLOGY_NAME}.ttl

    - name: Create ontology for used later for generating documentation
      run: |
        ontoconvert \
            -awe \
            --namespace="emmo:https://w3id.org/emmo#" \
            --namespace="${ONTOLOGY_PREFIX}:https://w3id.org/emmo/domain/${ONTOLOGY_NAME}#" \
            --base-iri="https://w3id.org/emmo/domain/${ONTOLOGY_NAME}#" \
            --iri="https://w3id.org/emmo/domain/${ONTOLOGY_NAME}" \
            --copy-annotation="elucidation-->http://purl.org/dc/terms/description" \
            --copy-annotation="prefLabel-->http://www.w3.org/2000/01/rdf-schema#label" \
            ${ONTOLOGY_NAME}.ttl \
            build/${ONTOLOGY_NAME}-doc.ttl

    - name: Copy dependencies to buid
      run: cp ${ONTOLOGY_NAME}-dependencies.ttl build/ && cp catalog-v001.xml build/

    - name: Create inferred ontology
      run: |
        bin/robot reason \
            --reasoner HermiT \
            --remove-redundant-subclass-axioms true \
            --preserve-annotated-axioms true \
            --exclude-owl-thing true \
            --exclude-duplicate-axioms true \
            --input build/${ONTOLOGY_NAME}.ttl \
            --output ${ONTOLOGY_NAME}-inferred.ttl
        ontoconvert --iri=https://w3id.org/emmo/domain/${ONTOLOGY_NAME}/inferred ${ONTOLOGY_NAME}-inferred.ttl build/${ONTOLOGY_NAME}-inferred.ttl

    - name: Generate markdown documentation of all keywords
      run: |
        keywords -i build/${ONTOLOGY_NAME}-doc.ttl --write-kw-md build/${ONTOLOGY_NAME}_kw.md --namespace-filter=https://w3id.org/emmo/domain/${ONTOLOGY_NAME}# --redefine=allow

    - name: Generate Widoco documentation
      run: |
        java -jar widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile build/${ONTOLOGY_NAME}-doc.ttl \
            -outFolder build/widoco \
            -getOntologyMetadata \
            -oops \
            -rewriteAll \
            -saveConfig build/widoco/widoco.conf \
            -webVowl \
            -licensius \
            -includeAnnotationProperties

    # Should be added automatically when running ontokit setup    
    - name: Generate Ontokit documentation to public
      run: |
        ontokit docs --iri-regex=https://w3id.org/emmo/domain/${ONTOLOGY_NAME} . && touch public/.nojekyll 
        cat build/conf.py

    # Copy turtle files from build to public
    # Consider if this should be done either in ontokit docs directly
    # or specified in more detail as part of ontokit setup (which makes this file)
    - name: Copy ontologies to public
      run: cp build/*ttl public/

    - name: Copy widoco documentation to public
      run: cp -r build/widoco public/widoco

    - name: Check content of build 
      run: ls -la build

    - name: Check content of public
      run: ls -la public


    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: public
        branch: gh-pages
        clean: true
        single-commit: true
