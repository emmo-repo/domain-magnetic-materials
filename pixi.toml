[workspace]
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]
name = "domain-magnetic-materials"
version = "0.0.6"
authors = [
  "Andrea Petrocchi",
  "Wilfried Hortschitz",
  "Martin Lang",
  "Martin Dobiasch",
  "Hans Fangohr",
  "Thomas Schrefl",
  "Samuel Holt",
  "Swapneel Amit Pathak",
]
description = "Magnetic Materials Domain Ontology (MagMO)."

[tasks]
build = {cmd="python src/build_ontology.py", description="Build ontology"}
reason = "ontoconvert magnetic-materials.ttl magnetic-materials.ttl --reasoner --infer --namespace emmo:https://w3id.org/emmo#"
check = "emmocheck magnetic-materials.ttl"
docs = "echo TODO"
all = { depends-on = ["build", "reason", "check", "docs"] } # run all steps subsequently

[dependencies]
emmontopy = ">=0.11.4"
python = ">3.11"
graphviz = ">=12.0.0,<13"
# python-graphviz = ">=0.21,<0.22"
# pandoc = ">=3.9.0.2,<4"
pandoc = "==3.1.3"
openjdk = ">=25.0.2,<26"
ipython = ">=9.10.0,<10"
sphinx = ">=9.1.0,<10"

[pypi-dependencies]
