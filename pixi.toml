[workspace]
channels = ["conda-forge"]
platforms = ["linux-64"]
name = "domain-magnetic-materials"
version = "0.0.5"
authors = [
  "Andrea Petrocchi <andrea.petrocchi@mpsd.mpg.de>",
  "Wilfried Hortschitz, DISS-UWK",
]
description = "Domain Ontology for Magnetic Materials (domm)."

[tasks]
check = "emmocheck magnetic-materials.ttl"
reason = "ontoconvert magnetic-materials.ttl magnetic-materials.ttl --reasoner --infer"

[dependencies]
python = ">3.11"
graphviz = ">=12.0.0,<13"
pandoc = "==3.1.3"
openjdk = ">=25.0.1,<26"
ipython = ">=9.10.0,<10"

[pypi-dependencies]
emmontopy = "*"
